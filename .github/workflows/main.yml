name: Build README then PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_readme_and_pdf:
    # Prevent infinite loops: when this workflow commits, it runs again as the bot.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python deps
        run: python -m pip install -r requirements.txt

      - name: Generate README.md from JSON
        run: python json_to_readme.py

      - name: Convert README.md to PDF
        run: python readme_to_pdf.py --engine weasyprint --input README.md --output README.pdf --font-dir fonts

      - name: Commit generated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.pdf
          git diff --cached --quiet && exit 0
          git commit -m "Update README and PDF"
          git push
